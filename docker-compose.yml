version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9000:9000"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_KEY=base64:2vB2K3e8K4L5M6N7O8P9Q0R1S2T3U4V5W6X7Y8Z9=
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=dispatch
      - DB_USERNAME=dispatch
      - DB_PASSWORD=password
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - mysql
      - redis
    volumes:
      - .:/app
      - /app/node_modules
      - /app/vendor
    networks:
      - dispatch

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_DATABASE=dispatch
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_USER=dispatch
      - MYSQL_PASSWORD=password
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - dispatch
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - dispatch
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 20s
      retries: 10

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - .:/app
    depends_on:
      - app
    networks:
      - dispatch

networks:
  dispatch:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
